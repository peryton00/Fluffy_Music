<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fluffy Music</title>
    <meta name="description" content="Stream any Spotify playlist, album, or song via YouTube. Free music player.">
    <meta name="theme-color" content="#6C63FF">

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Fluffy Music">
    <link rel="apple-touch-icon" href="/src/img/icon-192.png">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <!-- Vercel Insights & Speed Insights -->
    <script>
        window.va = window.va || function () { (window.vaq || []).push(arguments); };
        window.si = window.si || function () { (window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/insights/script.js"></script>
    <script defer src="/_vercel/speed-insights/script.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/src/img/icon.png">

    <!-- App CSS -->
    <link rel="stylesheet" href="/src/css/style.css">
</head>

<body id="app-shell">

    <!-- ── Top Navbar ──────────────────────────────────────────────────────── -->
    <nav id="top-nav" aria-label="Main navigation">
        <a href="/" class="nav-logo" aria-label="Fluffy Music home">
            <img src="/src/img/icon.png" alt="Fluffy Music Icon" width="24" height="24" class="nav-logo-img">
            <span class="nav-logo-text">Fluffy Music</span>
        </a>

        <div class="nav-search-wrap">
            <i data-lucide="search" class="nav-search-icon" style="width:16px;height:16px;"></i>
            <input type="search" id="top-search" placeholder="Search any song or paste a Spotify link…"
                autocomplete="off" spellcheck="false" aria-label="Search songs or paste Spotify link">
        </div>

        <button id="hamburger" class="ctrl-btn" aria-label="Open menu" aria-expanded="false">
            <i data-lucide="menu"></i>
        </button>
    </nav>

    <!-- ── Body Wrap ───────────────────────────────────────────────────────── -->
    <div id="body-wrap">

        <!-- ── Left Sidebar ──────────────────────────────────────────────────── -->
        <aside id="sidebar" aria-label="Library sidebar">
            <button id="sidebar-close" class="ctrl-btn mobile-only" aria-label="Close menu">
                <i data-lucide="x"></i>
            </button>

            <div class="sidebar-section">
                <p class="sidebar-section-title">Your Library</p>

                <!-- Liked Songs entry -->
                <div id="sidebar-liked" class="sidebar-item sidebar-liked-item" role="button" tabindex="0"
                    aria-label="Liked Songs">
                    <span class="sidebar-liked-icon">♥</span>
                    <div class="sidebar-item-info">
                        <span class="sidebar-item-name">Liked Songs</span>
                        <span class="sidebar-item-meta">Playlist</span>
                    </div>
                    <span id="liked-songs-count" class="liked-count-badge" style="display:none;"></span>
                </div>

                <div id="saved-links-list" role="list" aria-label="Saved playlists and albums">
                    <!-- Populated by renderSavedLinks() -->
                </div>
            </div>

            <!-- Playback Quality Settings (Moved from Navbar) -->
            <div class="sidebar-section settings-sidebar-section">
                <p class="sidebar-section-title">Playback Quality</p>
                <div class="mode-btn-group sidebar-mode-group">
                    <button class="mode-btn" data-mode-btn="data_saver" aria-label="Data Saver mode">🌿 Data Saver</button>
                    <button class="mode-btn" data-mode-btn="normal" aria-label="Normal mode">🎵 Normal</button>
                    <button class="mode-btn" data-mode-btn="standard" aria-label="Standard mode">✨ Standard</button>
                </div>
                <p id="mode-description" class="mode-desc">Balanced quality and data usage</p>
            </div>

            <!-- Sidebar footer: login prompt or user info -->
            <div style="margin-top:auto;">
                <!-- Login card (for unauthenticated users) -->
                <div id="sidebar-login-card">
                    <i data-lucide="cloud"
                        style="width:28px;height:28px;color:var(--text-muted);margin:0 auto 10px;display:block;"></i>
                    <p>Sign in to sync your library across all your devices.</p>
                    <button id="sidebar-login-btn" class="btn btn-primary" style="width:100%;justify-content:center;">
                        Sign in with Google
                    </button>
                </div>

                <!-- User info (for authenticated users, hidden by default) -->
                <div id="sidebar-user-info" class="hidden">
                    <div class="sidebar-user-top">
                        <img id="sidebar-user-avatar" src="" alt="" width="32" height="32">
                        <div class="sidebar-user-details">
                            <span class="name" id="sidebar-user-name">User</span>
                            <span class="synced">☁ Library synced</span>
                        </div>
                    </div>
                    <button id="logout-btn" class="btn-sidebar-logout" aria-label="Sign out">
                        <i data-lucide="log-out" style="width:16px;height:16px;"></i>
                        Logout
                    </button>
                </div>
            </div>
        </aside>

        <!-- Mobile sidebar overlay -->
        <div id="sidebar-overlay" aria-hidden="true"></div>

        <!-- ── Main Content ───────────────────────────────────────────────────── -->
        <main id="main-content" role="main" aria-label="Music content">
            <!-- Populated by renderHomeView() / renderPlaylistHero() / renderTrackList() -->
        </main>

    </div><!-- /body-wrap -->


    <!-- ── Hidden YouTube Player ─────────────────────────────────────────────── -->
    <div id="yt-hidden-slot" aria-hidden="true">
        <div id="yt-player-container"></div>
    </div>

    <!-- ── Player Bar ────────────────────────────────────────────────────────── -->
    <footer id="player-bar" class="hidden" role="region" aria-label="Music player controls">

        <!-- Left: track info -->
        <div class="player-track-info">
            <img id="player-art" src="" alt="Album art" width="48" height="48">
            <div class="player-text">
                <span id="player-track-name">–</span>
                <span id="player-track-artist">–</span>
            </div>
        </div>

        <!-- Center: controls + progress -->
        <div class="player-center">
            <div class="player-controls" role="group" aria-label="Playback controls">
                <button id="btn-shuffle" class="ctrl-btn" aria-label="Shuffle" title="Shuffle: Off">
                    <i data-lucide="shuffle" style="width:18px;height:18px;"></i>
                </button>
                <button id="btn-prev" class="ctrl-btn" aria-label="Previous track">
                    <i data-lucide="skip-back" style="width:20px;height:20px;"></i>
                </button>
                <button id="btn-play" aria-label="Play" role="switch" aria-checked="false">
                    <i data-lucide="play" style="width:20px;height:20px;"></i>
                </button>
                <button id="btn-next" class="ctrl-btn" aria-label="Next track">
                    <i data-lucide="skip-forward" style="width:20px;height:20px;"></i>
                </button>
                <button id="btn-repeat" class="ctrl-btn" data-mode="none" aria-label="Repeat" title="Repeat: none">
                    <i data-lucide="repeat" style="width:18px;height:18px;"></i>
                </button>
            </div>

            <div class="player-progress-wrap" role="group" aria-label="Seek bar">
                <span class="time-display" id="time-current" aria-label="Current time">0:00</span>
                <div id="progress-bar" role="slider" aria-label="Seek" aria-valuemin="0" aria-valuemax="100"
                    aria-valuenow="0">
                    <div id="progress-fill"></div>
                    <div id="progress-thumb"></div>
                </div>
                <span class="time-display" id="time-total" aria-label="Total duration">0:00</span>
            </div>
        </div>

        <!-- Right: mode toggle + volume -->
        <div class="player-right">
            <div class="volume-wrap" aria-label="Volume control">
                <i data-lucide="volume-2" class="volume-icon" style="width:16px;height:16px;"></i>
                <input type="range" id="volume-slider" min="0" max="100" value="80" aria-label="Volume">
            </div>
        </div>

    </footer><!-- /player-bar -->

    <!-- Toast container (appended by JS, but pre-placing it helps) -->
    <div id="toast-container" aria-live="polite" aria-atomic="false"></div>

    <!-- ── Firebase SDK (ESM, loaded as module) ────────────────────────────────── -->
    <!-- app.js imports firebase.js which imports from Firebase CDN -->
    <script type="module" src="/src/js/app.js"></script>

    <!-- ── Initialize Lucide Icons (after DOM ready) ─────────────────────────── -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (window.lucide) {
                lucide.createIcons();
            }
        });
    </script>

    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker
            .register('/service-worker.js')
            .then(reg => console.log('SW registered:', reg.scope))
            .catch(err => console.warn('SW registration failed:', err));
        });
      }
    </script>

</body>

</html>

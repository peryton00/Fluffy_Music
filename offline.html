<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>You're Offline — Fluffy Music</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
    }

    body {
      background-color: #0A0A0F;
      color: #FFFFFF;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Inter', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      text-align: center;
    }

    .container {
      max-width: 420px;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    .icon-wrap {
      position: relative;
      display: inline-block;
    }

    .icon-wrap img {
      width: 96px;
      height: 96px;
      border-radius: 24px;
      box-shadow: 0 0 40px rgba(108, 99, 255, 0.4);
    }

    .offline-badge {
      position: absolute;
      bottom: -6px;
      right: -6px;
      width: 28px;
      height: 28px;
      background: #1a1a2e;
      border: 2px solid #0A0A0F;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
    }

    .heading {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtext {
      font-size: 15px;
      color: #A0A0B8;
      line-height: 1.6;
      max-width: 320px;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      border-radius: 2px;
    }

    .info-box {
      background: rgba(108, 99, 255, 0.08);
      border: 1px solid rgba(108, 99, 255, 0.2);
      border-radius: 12px;
      padding: 16px 20px;
      width: 100%;
    }

    .info-box p {
      font-size: 13px;
      color: #A0A0B8;
      line-height: 1.6;
    }

    .info-box p strong {
      color: #FFFFFF;
    }

    .btn-retry {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 14px 32px;
      background: linear-gradient(135deg, #6C63FF, #FF6584);
      color: #FFFFFF;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: opacity 0.2s ease, transform 0.15s ease;
      box-shadow: 0 4px 20px rgba(108, 99, 255, 0.4);
    }

    .btn-retry:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-retry:active {
      transform: translateY(0);
    }

    .pulsing {
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.04); }
    }
  </style>
</head>

<body>
  <div class="container">
    <div class="icon-wrap pulsing">
      <img src="/src/img/icon-192.png" alt="Fluffy Music" onerror="this.style.display='none'">
      <div class="offline-badge">📶</div>
    </div>

    <h1 class="heading">You're Offline</h1>

    <p class="subtext">
      Connect to the internet to stream music.<br>
      Your library and liked songs are saved locally.
    </p>

    <div class="divider"></div>

    <div class="info-box">
      <p>
        <strong>Liked Songs</strong> and your <strong>saved playlists</strong>
        are stored on this device and will be available when you reconnect.
      </p>
    </div>

    <button class="btn-retry" onclick="window.location.reload()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/>
        <path d="M21 3v5h-5"/>
        <path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/>
        <path d="M8 16H3v5"/>
      </svg>
      Try Again
    </button>
  </div>
</body>

</html>
